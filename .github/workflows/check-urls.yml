name: Check & Update Provider URLs
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install axios
      - name: Check URLs
        run: node .github/scripts/url-checker.js
      - name: Commit updated modflix.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-update provider URLs [skip ci]'
          file_pattern: 'modflix.json'
